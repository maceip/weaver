<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <style>
      .h1{font-size:30px;font-weight:700;fill:#111}
      .sub{font-size:14px;fill:#666}
      .h2{font-size:20px;font-weight:700;fill:#fff}
      .hsub{font-size:13px;fill:#cfe2ff}
      .intent{font-size:15px;fill:#222;font-weight:600}
      .panel{fill:#fff;stroke:#222;stroke-width:2}
      .block{fill:#e6e8eb}
      .blockd{fill:#d2d6da}
      .new{fill:#e8f1ff;stroke:#1f6feb;stroke-width:2}
      .newsolid{fill:#1f6feb}
      .nt{fill:#1f6feb;font-size:12px;font-weight:700}
      .hinge{stroke:#9aa0a6;stroke-width:2;stroke-dasharray:5 4}
      .at{font-size:13px;font-weight:700;fill:#111}
      .ad{font-size:12.5px;fill:#444}
      .lead{stroke:#9aa0a6;stroke-width:1;fill:none}
      .cap{font-size:12.5px;fill:#555;font-weight:600}
      .notebox{fill:#eef1f4;stroke:#cdd3da;stroke-width:1}
      .bullet{font-size:13px;fill:#333}
    </style>
  </defs>

  <rect width="1000" height="650" fill="#f7f7f8"/>
  <text x="40" y="46" class="h1">Weaver · Foldable Features</text>
  <text x="40" y="70" class="sub">Wireframe 2 of 3 — Fold-to-Compare. Low-fidelity layout intent. Blue = new elements.</text>
  <line x1="40" y1="86" x2="960" y2="86" stroke="#dcdfe3"/>

  <g transform="translate(0,110)">
    <rect x="40" y="0" width="920" height="46" rx="10" class="newsolid"/>
    <text x="62" y="30" class="h2">02 — Fold-to-Compare</text>
    <text x="938" y="29" text-anchor="end" class="hsub">input: continuous hinge angle</text>
    <text x="40" y="80" class="intent">The hinge angle scrubs an A / B onion-skin blend of two selected designs.</text>

    <!-- frame A: flat -->
    <g transform="translate(70,104)">
      <rect x="0" y="0" width="250" height="150" rx="14" class="panel"/>
      <line x1="125" y1="0" x2="125" y2="150" class="hinge"/>
      <rect x="22" y="26" width="80" height="14" class="blockd"/>
      <rect x="22" y="50" width="80" height="64" class="block"/>
      <rect x="148" y="26" width="80" height="14" class="blockd"/>
      <rect x="148" y="50" width="80" height="64" class="block"/>
      <text x="125" y="178" text-anchor="middle" class="cap">FLAT · 180°  —  A | B side by side</text>
    </g>

    <!-- frame B: folding (tent) -->
    <g transform="translate(0,104)">
      <polygon points="372,150 470,166 470,30 372,14" class="panel"/>
      <polygon points="470,166 568,150 568,14 470,30" class="panel"/>
      <line x1="470" y1="30" x2="470" y2="166" class="hinge"/>
      <rect x="392" y="52" width="60" height="48" class="block" transform="skewY(9)"/>
      <rect x="492" y="40" width="60" height="48" class="block" transform="skewY(-9)"/>
      <text x="470" y="192" text-anchor="middle" class="cap">FOLDING · ~135°  —  panes converge</text>
    </g>

    <!-- frame C: blend -->
    <g transform="translate(620,104)">
      <rect x="0" y="0" width="250" height="150" rx="14" class="panel"/>
      <g opacity="0.35">
        <rect x="40" y="26" width="150" height="16" class="blockd"/>
        <rect x="40" y="52" width="150" height="62" class="block"/>
      </g>
      <g opacity="0.9">
        <rect x="58" y="34" width="150" height="16" fill="#1f6feb" opacity="0.5"/>
        <rect x="58" y="60" width="150" height="62" fill="#1f6feb" opacity="0.3"/>
      </g>
      <text x="125" y="178" text-anchor="middle" class="cap">~110° · ONION-SKIN BLEND</text>
    </g>

    <!-- blend scale -->
    <g transform="translate(0,300)">
      <text x="300" y="0" class="nt">calibrated comfort band — anchored to the angle on entry</text>
      <path d="M300,8 L300,18 L700,18 L700,8" class="lead" stroke="#1f6feb"/>
      <text x="276" y="40" class="cap">A</text>
      <line x1="300" y1="36" x2="700" y2="36" stroke="#222" stroke-width="2"/>
      <text x="712" y="40" class="cap">B</text>
      <circle cx="556" cy="36" r="8" class="newsolid"/>
      <text x="556" y="62" text-anchor="middle" class="ad">blend follows the hinge · tap to LOCK</text>
    </g>

    <!-- notes -->
    <g transform="translate(0,378)">
      <rect x="60" y="0" width="880" height="150" rx="10" class="notebox"/>
      <text x="80" y="28" class="at">Needs-thinking</text>
      <text x="80" y="52" class="bullet">•  Two designs selected first (filmstrip or multi-select); both must be in the Done state.</text>
      <text x="80" y="74" class="bullet">•  Continuous angle via Sensor.TYPE_HINGE_ANGLE — capability-gated; falls back to a touch slider.</text>
      <text x="80" y="96" class="bullet">•  Calibrates on entry: current angle = anchor, ±35° comfort band maps to 0–100% blend.</text>
      <text x="80" y="118" class="bullet">•  Render modes: onion-skin / wipe / difference. Mode suspends the adaptive pane layout.</text>
      <text x="80" y="140" class="bullet">•  Folding fully shut exits the mode but remembers both designs so it can resume.</text>
    </g>
  </g>
</svg>
