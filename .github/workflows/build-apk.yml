name: Build APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build :app debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Surface APK metadata
        run: |
          set -eu
          APK=app/build/outputs/apk/debug/app-debug.apk
          ls -lh "$APK"
          echo "sha256=$(sha256sum "$APK" | cut -d' ' -f1)"
          echo "size=$(stat -c%s "$APK") bytes"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: weaver-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
