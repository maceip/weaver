<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1900" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <style>
      .h1{font-size:30px;font-weight:700;fill:#111}
      .sub{font-size:14px;fill:#666}
      .h2{font-size:20px;font-weight:700;fill:#fff}
      .hsub{font-size:13px;fill:#cfe2ff}
      .intent{font-size:15px;fill:#222;font-weight:600}
      .panel{fill:#fff;stroke:#222;stroke-width:2}
      .screen{fill:#fbfbfc;stroke:#222;stroke-width:1.5}
      .block{fill:#e6e8eb}
      .blockd{fill:#d2d6da}
      .new{fill:#e8f1ff;stroke:#1f6feb;stroke-width:2}
      .newsolid{fill:#1f6feb}
      .nt{fill:#1f6feb;font-size:12px;font-weight:700}
      .hinge{stroke:#9aa0a6;stroke-width:2;stroke-dasharray:5 4}
      .at{font-size:13px;font-weight:700;fill:#111}
      .ad{font-size:12.5px;fill:#444}
      .lead{stroke:#9aa0a6;stroke-width:1;fill:none}
      .cap{font-size:12.5px;fill:#555;font-weight:600}
      .notebox{fill:#eef1f4;stroke:#cdd3da;stroke-width:1}
      .bullet{font-size:13px;fill:#333}
      .api{font-family:Menlo,Consolas,monospace;font-size:11.5px;fill:#1f6feb}
    </style>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect width="1000" height="1900" fill="#f7f7f8"/>
  <text x="40" y="50" class="h1">Weaver · Foldable Features</text>
  <text x="40" y="74" class="sub">Wireframes for approval — low-fidelity layout intent only, not final visual design. Blue = new elements.</text>
  <line x1="40" y1="90" x2="960" y2="90" stroke="#dcdfe3"/>

  <!-- ================= SECTION 1 — TABLETOP STUDIO ================= -->
  <g transform="translate(0,118)">
    <rect x="40" y="0" width="920" height="46" rx="10" class="newsolid"/>
    <text x="62" y="30" class="h2">01 — Tabletop Studio</text>
    <text x="938" y="29" text-anchor="end" class="hsub">posture: half-open · horizontal hinge</text>
    <text x="40" y="80" class="intent">Top panel becomes the canvas; the bottom flat panel becomes a physical control deck.</text>

    <!-- device, translate(110,110) -->
    <g transform="translate(110,110)">
      <rect x="0" y="0" width="340" height="470" rx="20" class="panel"/>
      <!-- top: canvas -->
      <rect x="16" y="16" width="308" height="190" rx="8" class="screen"/>
      <rect x="34" y="34" width="180" height="18" class="blockd"/>
      <rect x="34" y="64" width="272" height="46" class="block"/>
      <rect x="34" y="118" width="272" height="36" class="block"/>
      <rect x="34" y="166" width="88" height="20" class="blockd"/>
      <!-- hinge -->
      <rect x="0" y="220" width="340" height="20" fill="#e3e4e7"/>
      <line x1="0" y1="230" x2="340" y2="230" class="hinge"/>
      <!-- bottom: control deck -->
      <text x="24" y="262" class="nt">VERSION FILMSTRIP</text>
      <g>
        <rect x="24" y="270" width="42" height="48" rx="4" class="new"/>
        <rect x="86" y="270" width="42" height="48" rx="4" class="newsolid"/>
        <rect x="148" y="270" width="42" height="48" rx="4" class="new"/>
        <rect x="210" y="270" width="42" height="48" rx="4" class="new"/>
        <rect x="272" y="270" width="42" height="48" rx="4" class="new"/>
        <text x="107" y="299" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">v4</text>
      </g>
      <!-- drag-up arrow -->
      <path d="M107,268 C107,225 150,210 168,194" class="lead" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arr)" stroke-dasharray="4 3"/>
      <text x="120" y="250" class="nt">drag up</text>
      <!-- composer -->
      <rect x="24" y="338" width="248" height="34" rx="17" class="new"/>
      <text x="40" y="359" font-size="12" fill="#1f6feb">Describe a change…</text>
      <circle cx="298" cy="355" r="16" class="newsolid"/>
      <path d="M292,361 L298,349 L304,361 Z" fill="#fff"/>
      <!-- tools -->
      <circle cx="42" cy="404" r="9" fill="#fff" stroke="#666"/>
      <circle cx="74" cy="404" r="9" fill="#fff" stroke="#666"/>
      <circle cx="106" cy="404" r="9" fill="#fff" stroke="#666"/>
      <circle cx="138" cy="404" r="9" fill="#fff" stroke="#666"/>
      <!-- orb -->
      <circle cx="296" cy="408" r="28" fill="#d6e6ff"/>
      <circle cx="296" cy="408" r="17" class="newsolid"/>
    </g>

    <!-- side-profile glyph -->
    <g transform="translate(54,150)">
      <path d="M0,70 L0,8 M0,70 L40,70" stroke="#888" stroke-width="6" fill="none" stroke-linecap="round"/>
      <text x="-4" y="92" class="cap" font-size="11">tabletop prop</text>
    </g>

    <!-- annotations -->
    <g>
      <line x1="505" y1="200" x2="452" y2="223" class="lead"/>
      <text x="512" y="190" class="at">Canvas — above the hinge</text>
      <text x="512" y="208" class="ad">The generated design, propped toward you. Pinch-zoom</text>
      <text x="512" y="224" class="ad">transform is re-clamped when the layout splits.</text>

      <line x1="505" y1="318" x2="452" y2="340" class="lead"/>
      <text x="512" y="294" class="at">Hinge — occluded seam</text>
      <text x="512" y="312" class="ad">No content or touch targets here. Split layouts at the</text>
      <text x="512" y="328" class="ad">reported hinge bounds, never at height / 2.</text>

      <line x1="505" y1="408" x2="452" y2="424" class="lead"/>
      <text x="512" y="384" class="at">Version filmstrip</text>
      <text x="512" y="402" class="ad">Durable thumbnails from VersionHistory. Drag one up</text>
      <text x="512" y="418" class="ad">onto the canvas → preview · revert · branch.</text>

      <line x1="505" y1="486" x2="452" y2="468" class="lead"/>
      <text x="512" y="462" class="at">Control deck + IME</text>
      <text x="512" y="480" class="ad">Composer, tools and orb re-parent here. Tapping the</text>
      <text x="512" y="496" class="ad">composer floats it up — the keyboard would cover the deck.</text>

      <line x1="505" y1="540" x2="452" y2="528" class="lead"/>
      <text x="512" y="534" class="at">Agent orb</text>
      <text x="512" y="552" class="ad">On the deck it has room for richer progress than the overlay.</text>
    </g>
  </g>

  <!-- ================= SECTION 2 — FOLD-TO-COMPARE ================= -->
  <g transform="translate(0,748)">
    <rect x="40" y="0" width="920" height="46" rx="10" class="newsolid"/>
    <text x="62" y="30" class="h2">02 — Fold-to-Compare</text>
    <text x="938" y="29" text-anchor="end" class="hsub">input: continuous hinge angle</text>
    <text x="40" y="80" class="intent">The hinge angle scrubs an A / B onion-skin blend of two selected designs.</text>

    <!-- frame A: flat -->
    <g transform="translate(70,104)">
      <rect x="0" y="0" width="250" height="150" rx="14" class="panel"/>
      <line x1="125" y1="0" x2="125" y2="150" class="hinge"/>
      <rect x="22" y="26" width="80" height="14" class="blockd"/>
      <rect x="22" y="50" width="80" height="64" class="block"/>
      <rect x="148" y="26" width="80" height="14" class="blockd"/>
      <rect x="148" y="50" width="80" height="64" class="block"/>
      <text x="125" y="178" text-anchor="middle" class="cap">FLAT · 180°  —  A | B side by side</text>
    </g>

    <!-- frame B: folding (tent) -->
    <g transform="translate(0,104)">
      <polygon points="372,150 470,166 470,30 372,14" class="panel"/>
      <polygon points="470,166 568,150 568,14 470,30" class="panel"/>
      <line x1="470" y1="30" x2="470" y2="166" class="hinge"/>
      <rect x="392" y="52" width="60" height="48" class="block" transform="skewY(9)"/>
      <rect x="492" y="40" width="60" height="48" class="block" transform="skewY(-9)"/>
      <text x="470" y="192" text-anchor="middle" class="cap">FOLDING · ~135°  —  panes converge</text>
    </g>

    <!-- frame C: blend -->
    <g transform="translate(620,104)">
      <rect x="0" y="0" width="250" height="150" rx="14" class="panel"/>
      <g opacity="0.35">
        <rect x="40" y="26" width="150" height="16" class="blockd"/>
        <rect x="40" y="52" width="150" height="62" class="block"/>
      </g>
      <g opacity="0.9">
        <rect x="58" y="34" width="150" height="16" fill="#1f6feb" opacity="0.5"/>
        <rect x="58" y="60" width="150" height="62" fill="#1f6feb" opacity="0.3"/>
      </g>
      <text x="125" y="178" text-anchor="middle" class="cap">~110° · ONION-SKIN BLEND</text>
    </g>

    <!-- blend scale -->
    <g transform="translate(0,300)">
      <text x="300" y="0" class="nt">calibrated comfort band — anchored to the angle on entry</text>
      <path d="M300,8 L300,18 L700,18 L700,8" class="lead" stroke="#1f6feb"/>
      <text x="276" y="40" class="cap">A</text>
      <line x1="300" y1="36" x2="700" y2="36" stroke="#222" stroke-width="2"/>
      <text x="712" y="40" class="cap">B</text>
      <circle cx="556" cy="36" r="8" class="newsolid"/>
      <text x="556" y="62" text-anchor="middle" class="ad">blend follows the hinge · tap to LOCK</text>
    </g>

    <!-- notes -->
    <g transform="translate(0,378)">
      <rect x="60" y="0" width="880" height="150" rx="10" class="notebox"/>
      <text x="80" y="28" class="at">Needs-thinking</text>
      <text x="80" y="52" class="bullet">•  Two designs selected first (filmstrip or multi-select); both must be in the Done state.</text>
      <text x="80" y="74" class="bullet">•  Continuous angle via Sensor.TYPE_HINGE_ANGLE — capability-gated; falls back to a touch slider.</text>
      <text x="80" y="96" class="bullet">•  Calibrates on entry: current angle = anchor, ±35° comfort band maps to 0–100% blend.</text>
      <text x="80" y="118" class="bullet">•  Render modes: onion-skin / wipe / difference. Mode suspends the adaptive pane layout.</text>
      <text x="80" y="140" class="bullet">•  Folding fully shut exits the mode but remembers both designs so it can resume.</text>
    </g>
  </g>

  <!-- ================= SECTION 3 — FIRE-AND-FOLD ================= -->
  <g transform="translate(0,1378)">
    <rect x="40" y="0" width="920" height="46" rx="10" class="newsolid"/>
    <text x="62" y="30" class="h2">03 — Fire-and-Fold</text>
    <text x="938" y="29" text-anchor="end" class="hsub">handoff: inner screen → cover screen</text>
    <text x="40" y="80" class="intent">Fire a prompt, fold the phone, the cover screen tracks it to completion.</text>

    <!-- F1 inner: fire -->
    <g transform="translate(60,100)">
      <rect x="0" y="0" width="180" height="150" rx="12" class="panel"/>
      <rect x="16" y="18" width="148" height="40" class="block"/>
      <rect x="16" y="92" width="120" height="26" rx="13" class="new"/>
      <text x="26" y="109" font-size="10" fill="#1f6feb">make it bolder</text>
      <circle cx="150" cy="105" r="13" class="newsolid"/>
      <rect x="16" y="126" width="148" height="16" rx="8" fill="#dbe9ff"/>
      <text x="24" y="138" font-size="9.5" fill="#1f6feb">↻ keeps running if you fold</text>
      <text x="90" y="172" text-anchor="middle" class="cap">1 · fire the prompt</text>
    </g>
    <line x1="250" y1="175" x2="300" y2="175" class="lead" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arr)"/>

    <!-- F2 folded cover: progress -->
    <g transform="translate(312,118)">
      <rect x="0" y="0" width="116" height="116" rx="12" class="panel"/>
      <circle cx="30" cy="34" r="13" fill="#d6e6ff"/>
      <circle cx="30" cy="34" r="8" class="newsolid"/>
      <text x="50" y="31" font-size="10" fill="#222" font-weight="700">Weaver</text>
      <text x="50" y="44" font-size="9" fill="#666">Generating…</text>
      <rect x="16" y="62" width="84" height="10" rx="5" fill="#e6e8eb"/>
      <rect x="16" y="62" width="50" height="10" rx="5" class="newsolid"/>
      <text x="58" y="94" text-anchor="middle" font-size="9.5" fill="#666">cover screen</text>
      <text x="58" y="150" text-anchor="middle" class="cap">2 · folded — progress</text>
    </g>
    <line x1="440" y1="175" x2="490" y2="175" class="lead" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arr)"/>

    <!-- F3 cover ready -->
    <g transform="translate(502,118)">
      <rect x="0" y="0" width="116" height="116" rx="12" class="panel"/>
      <circle cx="30" cy="36" r="13" fill="#1f6feb"/>
      <path d="M25,36 l4,4 l7,-8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <text x="50" y="33" font-size="10" fill="#222" font-weight="700">Design ready</text>
      <text x="50" y="46" font-size="9" fill="#666">tap to open</text>
      <rect x="16" y="66" width="84" height="30" rx="6" class="new"/>
      <text x="58" y="85" text-anchor="middle" font-size="9.5" fill="#1f6feb">Open ›</text>
      <text x="58" y="150" text-anchor="middle" class="cap">3 · complete</text>
    </g>
    <line x1="630" y1="175" x2="680" y2="175" class="lead" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arr)"/>

    <!-- F4 unfold result -->
    <g transform="translate(692,100)">
      <rect x="0" y="0" width="180" height="150" rx="12" class="panel"/>
      <rect x="16" y="18" width="120" height="16" class="blockd"/>
      <rect x="16" y="42" width="148" height="56" class="block"/>
      <rect x="16" y="106" width="80" height="14" class="blockd"/>
      <circle cx="150" cy="120" r="16" fill="#1f6feb"/>
      <path d="M143,120 l5,5 l9,-10" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <text x="90" y="172" text-anchor="middle" class="cap">4 · unfold onto the result</text>
    </g>

    <!-- notes -->
    <g transform="translate(0,300)">
      <rect x="60" y="0" width="880" height="172" rx="10" class="notebox"/>
      <text x="80" y="28" class="at">Needs-thinking</text>
      <text x="80" y="52" class="bullet">•  The remote session owns the generation — it survives the WebView / Activity dying on fold.</text>
      <text x="80" y="74" class="bullet">•  onStop(Folded) → HandoffCoordinator guarantees keep-alive, or marks the task Not-Survivable.</text>
      <text x="80" y="96" class="bullet">•  v1: rich progress notification (the cover screen renders notifications natively — reliable).</text>
      <text x="80" y="118" class="bullet">•  v2: a dedicated cover-screen surface — gated on the per-app "continue on cover" permission.</text>
      <text x="80" y="140" class="bullet">•  onStart → reconcile which tasks finished while away; a stale session shows "expired — re-run?".</text>
      <text x="80" y="162" class="bullet">•  Local-only transport at fold time → either promote to remote first, or warn it won't survive.</text>
    </g>
  </g>
</svg>
